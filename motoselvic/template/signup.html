<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<!-- The above 3 meta tags *must* come first in the head; any other head content must come *after* these tags -->

		<title>Electro - HTML Ecommerce Template</title>

		<!-- Google font -->
		<link href="https://fonts.googleapis.com/css?family=Montserrat:400,500,700"
			rel="stylesheet">

		<!-- Bootstrap -->
		<link type="text/css" rel="stylesheet"
			href="css/bootstrap.min.css" />
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
			crossorigin="anonymous">

		<!-- Font Awesome Icon -->
		<link rel="stylesheet" href="../static/css/font-awesome.min.css">

		<!-- Custom stlylesheet -->
		<link type="text/css" rel="stylesheet" href="../static/css/style.css">

		<link rel="stylesheet" href="../static/css/mystyle.css">

		<!-- HTML5 shim and Respond.js for IE8 support of HTML5 elements and media queries -->
		<!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
		<!--[if lt IE 9]>
 		  <script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
 		  <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
 		<![endif]-->

	</head>
	<body>
		<!-- HEADER -->
		<header>
			<!-- TOP HEADER -->
			<!-- <div id="top-header">
				<div class="container">
					<ul class="header-links pull-left">
						<li><a href="#"><i class="fa fa-phone"></i> +021-95-51-84</a></li>
						<li><a href="#"><i class="fa fa-envelope-o"></i> email@email.com</a></li>
						<li><a href="#"><i class="fa fa-map-marker"></i> 1734 Stonecoal Road</a></li>
					</ul>
					<ul class="header-links pull-right">
						<li><a href="#"><i class="fa fa-dollar"></i> USD</a></li>
						<li><a href="#"><i class="fa fa-user-o"></i> My Account</a></li>
					</ul>
				</div>
			</div> -->
			<!-- Nav bar -->
			<nav>
				<div style="background-color: rgb(23, 23, 24);">
					<ul class="list-group list-group-horizontal mt-2 mb-2 py-3"
						style="border-style: none; text-decoration: none; justify-content: center;">
						<li class="list-group-item px-3 navstyle"><a href="../"
								style="color: white; text-decoration: none; "> HOME </a></li>
						<li class="list-group-item px-3 navstyle"><a href="#"
								style="color: white; text-decoration: none; "> PHOTOS </a></li>
						<li class="list-group-item px-3 navstyle"><a href="#"
								style="color: white; text-decoration: none; "> SOCIAL MEDIA </a></li>
						<li class="list-group-item px-3 navstyle"><a href="#"
								style="color: white; text-decoration: none; "> TERMS & CONDITIONS </a></li>
						<li class="list-group-item px-3 navstyle"><a href="#"
								style="color: white; text-decoration: none; "> SUPPORT US </a></li>
						<li class="list-group-item px-3 navstyle"><a href="#"
								style="color: white; text-decoration: none; "> ABOUT </a></li>
						<li class="list-group-item px-3 navstyle"><a href="#"
								style="color: white; text-decoration: none; "> CONTACT US </a></li>
					</ul>
				</div>
			</nav>
			<!-- Nav bar -->
			<div class="bodystyle">
				<div class="login-wrapper">
					<div class="login-container">
						<h1>Welcome!</h1>
						<p>Create a new account</p>
						<form action="../" method="POST">
							{% csrf_token %}
							<div class="input-group">
								<label for="username">Username</label>
								<input type="text" id="username" name="username"
									placeholder="Enter your username" required>
							</div>

							<div class="input-group">
								<label for="username">Email</label>
								<input type="email" id="email" name="email"
									placeholder="Enter your email" required>
							</div>

							<div class="input-group">
								<label for="password">Password</label>
								<input type="password" id="password" name="password"
									placeholder="Enter your password" required>
							</div>

							<button type="submit">Sign Up</button>
						</form>
						<p class="signup-link">Already have an account? <a href="login">Sign In</a></p>
					</div>
				</div>
			</div>
			<!-- FOOTER -->
			<footer id="footer">
				<!-- bottom footer -->
				<div id="bottom-footer" class="section">
					<div class="container">
						<!-- row -->
						<div class="row">
							<div class="col-md-12 text-center">
								<img src="../static/images/logo.png" alt class="footerlogo">
								<span class="copyright">
									<!-- Link back to Colorlib can't be removed. Template is licensed under CC BY 3.0. -->
									Copyright
									All
									rights reserved by Motoselvic
									<!-- Link back to Colorlib can't be removed. Template is licensed under CC BY 3.0. -->
								</span>

							</div>
						</div>
						<!-- /row -->
					</div>
					<!-- /container -->
				</div>
				<!-- /bottom footer -->
			</footer>
			<!-- /FOOTER -->

			<!-- jQuery Plugins -->
			<script src="js/jquery.min.js"></script>
			<script
				src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
				integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
				crossorigin="anonymous"></script>
			<script src="js/bootstrap.min.js"></script>
			<script src="js/slick.min.js"></script>
			<script src="js/nouislider.min.js"></script>
			<script src="js/jquery.zoom.min.js"></script>
			<script src="js/main.js"></script>

		</body>
	</html>

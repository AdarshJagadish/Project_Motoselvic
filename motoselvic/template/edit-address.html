<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Address - Motoselvic</title>
    <link rel="stylesheet" href="../static/css/profile.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <div class="card p-4">
            <h4 class="mb-3">Edit Address</h4>
            <form action="update-address.php" method="POST">
                <div class="mb-3">
                    <label for="address-type" class="form-label">Address Type</label>
                    <select class="form-control" id="address-type" name="address_type">
                        <option value="home" selected>Home</option>
                        <option value="office">Office</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="street" class="form-label">Street</label>
                    <input type="text" class="form-control" id="street" name="street" value="123, Street Name">
                </div>
                <div class="mb-3">
                    <label for="city" class="form-label">City</label>
                    <input type="text" class="form-control" id="city" name="city" value="Your City">
                </div>
                <div class="mb-3">
                    <label for="state" class="form-label">State</label>
                    <input type="text" class="form-control" id="state" name="state" value="Your State">
                </div>
                <div class="mb-3">
                    <label for="pincode" class="form-label">Pincode</label>
                    <input type="text" class="form-control" id="pincode" name="pincode" value="000000">
                </div>
                <button type="submit" class="btn btn-primary">Save Address</button>
                <a href="dashboard.html" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>

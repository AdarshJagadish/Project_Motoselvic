<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - Motoselvic</title>
    <link rel="stylesheet" href="../static/css/profile.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <div class="card p-4">
            <h4 class="mb-3">Edit Profile</h4>
            <form action="update-profile.php" method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label for="profile-pic" class="form-label">Profile Picture</label>
                    <input type="file" class="form-control" id="profile-pic" name="profile_pic">
                </div>
                <div class="mb-3">
                    <label for="name" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="name" name="name" value="John Doe">
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" value="johndoe@example.com">
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label">Phone</label>
                    <input type="text" class="form-control" id="phone" name="phone" value="+91 9876543210">
                </div>
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="dashboard.html" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>

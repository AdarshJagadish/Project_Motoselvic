<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Payment Method - Motoselvic</title>
    <link rel="stylesheet" href="../static/css/profile.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <div class="card p-4">
            <h4 class="mb-3">Add Payment Method</h4>
            <form action="save-payment.php" method="POST">
                <div class="mb-3">
                    <label for="payment-type" class="form-label">Payment Type</label>
                    <select class="form-control" id="payment-type" name="payment_type">
                        <option value="visa">Visa</option>
                        <option value="mastercard">MasterCard</option>
                        <option value="upi">UPI</option>
                        <option value="paypal">PayPal</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="payment-details" class="form-label">Payment Details</label>
                    <input type="text" class="form-control" id="payment-details" name="payment_details" placeholder="Enter card number or UPI ID">
                </div>
                <button type="submit" class="btn btn-primary">Save Payment Method</button>
                <a href="dashboard.html" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In & Sign Up - Motoselvic</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
    <!-- Auth Container -->
    <div class="auth-container">
        <div class="card" id="auth-card">
            <div class="card-inner">
                <!-- Sign In Form -->
                <div class="card-front">
                    <h2>Sign In</h2>
                    <form id="signin-form" method="post" action="{% url 'signin' %}">
                        {% csrf_token %}
                        <div class="input-group">
                            <label for="signin-email">Email</label>
                            <input type="email" id="signin-email" name="email" required>
                        </div>
                        <div class="input-group">
                            <label for="signin-password">Password</label>
                            <input type="password" id="signin-password" name="password" required>
                        </div>
                        <div class="remember-me">
                            <input type="checkbox" id="remember-me"> <label for="remember-me">Remember Me</label>
                        </div>
                        <button type="submit">Sign In</button>
                        <p class="toggle-link">Don't have an account? <a href="#" onclick="flipCard()">Sign Up</a></p>
                        <p class="forgot-password"><a href="{% url 'forgot_password' %}">Forgot Password?</a></p>
                    </form>
                </div>

                <!-- Sign Up Form -->
                <div class="card-back">
                    <h2>Sign Up</h2>
                    <form id="signup-form" method="post" action="{% url 'signup' %}">
                        {% csrf_token %}
                        <div class="input-group">
                            <label for="signup-username">Username</label>
                            <input type="text" id="signup-username" name="username" required>
                        </div>
                        <div class="input-group">
                            <label for="signup-email">Email</label>
                            <input type="email" id="signup-email" name="email" required>
                        </div>
                        <div class="input-group">
                            <label for="signup-password">Password</label>
                            <input type="password" id="signup-password" name="password" required>
                        </div>
                        <button type="submit">Sign Up</button>
                        <p class="toggle-link">Already have an account? <a href="#" onclick="flipCard()">Sign In</a></p>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/auth.js' %}"></script>
</body>
</html>

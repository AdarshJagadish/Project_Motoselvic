<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous">
        <title>Bike Accessories Store</title>
        <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #F3F4F6; /* Light Gray */
            color: #1A1A1A; /* Almost Black */
        }

        /* Header */
        header {
            background-color: #1A1A1A; /* Black */
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header .logo {
            font-size: 28px;
            font-weight: bold;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        nav ul li {
            display: inline;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .search-cart {
            display: flex;
            gap: 10px;
        }

        .search-cart input {
            padding: 5px;
            border-radius: 5px;
            border: none;
            width: 200px;
        }

        /* Hero Section */
        .hero {
            background: url('bike-hero.jpg') no-repeat center center/cover;
            color: white;
            text-align: center;
            padding: 120px 20px;
            background-color: #2E2E2E; /* Dark Gray fallback */
        }

        .hero h1 {
            font-size: 50px;
            margin: 0;
        }

        .hero p {
            font-size: 20px;
            margin: 10px 0 25px;
        }

        .hero button {
            background-color: #FFFF00; /* Bright Yellow */
            color: #1A1A1A; /* Almost Black */
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
        }

        .hero button:hover {
            background-color: #FFD700; /* Golden Yellow */
        }

        /* Categories Section */
        .categories {
            padding: 50px 20px;
            text-align: center;
        }

        .categories h2 {
            margin-bottom: 25px;
            font-size: 28px;
        }

        .categories .category {
            display: inline-block;
            margin: 15px;
            padding: 25px;
            background-color: #FFFFFF; /* White */
            border-radius: 15px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
            width: 170px;
            font-size: 18px;
            color: #1A1A1A; /* Almost Black */
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .categories .category:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        /* Footer */
        footer {
            background-color: #2E2E2E; /* Dark Gray */
            color: white;
            padding: 25px;
            text-align: center;
        }

        footer a {
            color: #FFFF00; /* Bright Yellow */
            text-decoration: none;
            font-weight: bold;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 36px;
            }

            .hero p {
                font-size: 16px;
            }

            .categories .category {
                width: 140px;
                padding: 20px;
            }
        }
    </style>
    </head>
    <body>
        <!-- Header -->
        <header>
            <div>
                <nav class="navbar bg-dark border-bottom border-body"
                    data-bs-theme="dark">
                    <!-- Navbar content -->
                </nav>

                <nav class="navbar bg-primary" data-bs-theme="dark">
                    <!-- Navbar content -->
                </nav>

                <nav class="navbar" style="background-color: #e3f2fd;">
                    <!-- Navbar content -->
                </nav>
            </div>
            <div class="logo">
                <img
                    src="projects/To_do_List/todo/static/images/Ecommerce/logo/WhatsApp Image 2024-12-21 at 13.50.38_f1c4ac32.jpg"
                    style="width: 80px;" alt>
            </div>
            <nav>
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Shop</a></li>
                    <li><a href="#">About Us</a></li>
                    <li><a href="#">Blog</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>
            <div class="search-cart">
                <input type="text" placeholder="Search products...">
            </div>
        </header>

        <!-- Hero Section -->
        <section class="hero">
            <h1>Gear Up for Every Ride</h1>
            <p>Find the best bike accessories to make your ride smooth and
                stylish.</p>
            <button onclick="window.location.href='#categories'">Shop
                Now</button>
        </section>

        <!-- Categories Section -->
        <section id="categories" class="categories">
            <h2>Shop by Category</h2>
            <div class="category"
                onclick="alert('Viewing Helmets')">Helmets</div>
            <div class="category" onclick="alert('Viewing Lights')">Lights</div>
            <div class="category" onclick="alert('Viewing Bags')">Bags</div>
            <div class="category" onclick="alert('Viewing Tools')">Tools</div>
            <div class="category"
                onclick="alert('Viewing Apparel')">Apparel</div>
        </section>

        <!-- Footer -->
        <footer>
            <p>&copy; 2024 BikeStore | <a href="#">Privacy Policy</a></p>
        </footer>

        <!-- Placeholder Script -->
        <script>
        // Add functionality here later if needed
        console.log("Website loaded successfully!");
    </script>
    </body>
</html>
